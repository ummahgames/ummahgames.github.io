<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Downhill Snowboarding 3D</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: linear-gradient(#aeefff, #ffffff);
      font-family: Arial, sans-serif;
      color: white;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      padding: 10px 15px;
      border-radius: 8px;
    }
    #hud h1 {
      margin: 0;
      font-size: 18px;
    }
    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.7);
      padding: 20px 40px;
      border-radius: 12px;
      display: none;
      text-align: center;
    }
    #game-over h2 {
      margin: 0 0 15px 0;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="hud">
    <h1>Score: <span id="score">0</span></h1>
    <h1>Level: <span id="level">1</span></h1>
  </div>
  <div id="game-over">
    <h2>Game Over</h2>
    <p>Your Score: <span id="final-score">0</span></p>
    <button onclick="restartGame()">Restart</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // === GLOBALS ===
    let scene, camera, renderer, snowboarder, terrain;
    let obstacles = [], collectibles = [], caves = [];
    let score = 0, level = 1, speed = 0.5;
    let gameOver = false;

    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const finalScoreEl = document.getElementById('final-score');
    const gameOverEl = document.getElementById('game-over');

    // === INIT ===
    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
      camera.position.set(0, 5, 15);

      renderer = new THREE.WebGLRenderer({antialias: true});
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Lights
      const ambient = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
      dirLight.position.set(10,20,10);
      scene.add(dirLight);

      // Terrain
      const geometry = new THREE.PlaneGeometry(100, 1000, 50, 500);
      geometry.rotateX(-Math.PI/2);
      const material = new THREE.MeshLambertMaterial({color: 0xffffff, side: THREE.DoubleSide});
      terrain = new THREE.Mesh(geometry, material);
      terrain.position.z = -400;
      scene.add(terrain);

      // Snowboarder (simple box man)
      const boardGeo = new THREE.BoxGeometry(1,0.2,3);
      const boardMat = new THREE.MeshStandardMaterial({color:0x222222});
      const board = new THREE.Mesh(boardGeo, boardMat);
      const bodyGeo = new THREE.BoxGeometry(1,2,1);
      const bodyMat = new THREE.MeshStandardMaterial({color:0xff5555});
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 1.1;
      snowboarder = new THREE.Group();
      snowboarder.add(board);
      snowboarder.add(body);
      snowboarder.position.set(0,0,5);
      scene.add(snowboarder);

      // Controls
      document.addEventListener('keydown', (e)=>{
        if(gameOver) return;
        if(e.key === 'ArrowLeft') snowboarder.position.x -= 2;
        if(e.key === 'ArrowRight') snowboarder.position.x += 2;
      });

      window.addEventListener('resize', ()=>{
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // === GAME OBJECTS ===
    function spawnObstacle() {
      const geo = new THREE.ConeGeometry(1,4,8);
      const mat = new THREE.MeshLambertMaterial({color:0x006600});
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((Math.random()*2-1)*15, 0, camera.position.z - 100);
      scene.add(mesh);
      obstacles.push(mesh);
    }

    function spawnCollectible() {
      const geo = new THREE.SphereGeometry(0.7,16,16);
      const mat = new THREE.MeshLambertMaterial({color:0xffff00, emissive:0xffaa00});
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((Math.random()*2-1)*15, 1, camera.position.z - 100);
      scene.add(mesh);
      collectibles.push(mesh);
    }

    function spawnCave() {
      const geo = new THREE.TorusGeometry(6, 1, 16, 100);
      const mat = new THREE.MeshLambertMaterial({color:0x888888, side: THREE.DoubleSide});
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = Math.PI/2;
      mesh.position.set(0,3, camera.position.z - 150);
      scene.add(mesh);
      caves.push(mesh);
    }

    // === ANIMATE ===
    function animate() {
      requestAnimationFrame(animate);
      if(gameOver) return;

      // Move terrain & objects
      terrain.position.z += speed;
      obstacles.forEach((obs, i)=>{
        obs.position.z += speed;
        if(obs.position.z > camera.position.z+5){
          scene.remove(obs);
          obstacles.splice(i,1);
        }
        // Collision
        if(Math.abs(obs.position.x - snowboarder.position.x)<1.5 && Math.abs(obs.position.z - snowboarder.position.z)<2){
          endGame();
        }
      });
      collectibles.forEach((c,i)=>{
        c.position.z += speed;
        if(c.position.z > camera.position.z+5){
          scene.remove(c);
          collectibles.splice(i,1);
        }
        // Collect
        if(Math.abs(c.position.x - snowboarder.position.x)<1.5 && Math.abs(c.position.z - snowboarder.position.z)<2){
          score+=10;
          scoreEl.textContent = score;
          scene.remove(c);
          collectibles.splice(i,1);
        }
      });
      caves.forEach((cave,i)=>{
        cave.position.z += speed;
        if(cave.position.z > camera.position.z+20){
          scene.remove(cave);
          caves.splice(i,1);
        }
        // Miss cave penalty
        if(cave.position.z > snowboarder.position.z-1 && Math.abs(snowboarder.position.x)>6){
          endGame();
        }
      });

      // Random spawns
      if(Math.random()<0.02) spawnObstacle();
      if(Math.random()<0.01) spawnCollectible();
      if(Math.random()<0.005) spawnCave();

      // Leveling
      if(score>0 && score % 100 === 0){
        level++;
        speed += 0.1;
        levelEl.textContent = level;
        score++; // so we don’t level repeatedly at same score
      }

      renderer.render(scene, camera);
    }

    // === GAME FLOW ===
    function endGame(){
      gameOver = true;
      finalScoreEl.textContent = score;
      gameOverEl.style.display = 'block';
    }

    function restartGame(){
      // Reset
      obstacles.forEach(o=>scene.remove(o));
      collectibles.forEach(c=>scene.remove(c));
      caves.forEach(c=>scene.remove(c));
      obstacles = []; collectibles = []; caves = [];
      score=0; level=1; speed=0.5; gameOver=false;
      scoreEl.textContent=score;
      levelEl.textContent=level;
      snowboarder.position.set(0,0,5);
      gameOverEl.style.display = 'none';
      animate();
    }
  </script>
</body>
</html>
